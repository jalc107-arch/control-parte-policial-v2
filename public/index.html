<!DOCTYPE html>
<html>
<head>
  <title>Control de Partes</title>
</head>
<body>

<h2>Registrar Parte</h2>

<form id="form">
  <input type="text" id="estacion" placeholder="Estación" required><br><br>
  <input type="datetime-local" id="fecha" required><br><br>
  <input type="text" id="novedad" placeholder="Novedad" required><br><br>
  <button type="submit">Guardar</button>
</form>

<h2>Registros</h2>
<ul id="lista"></ul>

<script>
// GUARDAR
document.getElementById("form").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    estacion: document.getElementById("estacion").value,
    fecha: document.getElementById("fecha").value,
    novedad: document.getElementById("novedad").value
  };

  await fetch("/partes", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(data)
  });

  alert("Guardado correctamente");

  // limpiar formulario
  document.getElementById("form").reset();

  // recargar lista
  cargarPartes();
});

// CARGAR REGISTROS
async function cargarPartes() {
  const res = await fetch("/partes");
  const data = await res.json();

  const lista = document.getElementById("lista");
  lista.innerHTML = "";

  data.forEach(p => {
    const li = document.createElement("li");
    li.textContent = `${p.estacion} - ${p.novedad} - ${p.fecha}`;
    lista.appendChild(li);
  });
}

// cargar al iniciar
cargarPartes();
</script>

</body>
</html>
