<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Control de Partes</title>
  <style>
    /* =========================
       ESTILOS GENERALES
    ========================= */
    body {
      font-family: Arial, sans-serif;
      background: #0b3d91;
      color: white;
      text-align: center;
      padding: 30px;
      margin: 0;
    }

    h1, h2 {
      color: #00c853;
    }

    .card {
      background: white;
      color: black;
      padding: 20px;
      border-radius: 10px;
      max-width: 900px;
      margin: auto;
      box-shadow: 0 0 15px rgba(0,0,0,0.3);
    }

    input, select, button {
      padding: 10px;
      margin: 8px;
      border-radius: 5px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input, select {
      width: 70%;
      max-width: 500px;
    }

    button {
      background: #00c853;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border: none;
    }

    button:hover {
      opacity: 0.9;
    }

    .persona {
      border-bottom: 1px solid #ddd;
      padding: 10px 0;
      text-align: left;
    }

    .persona b {
      display: inline-block;
      min-width: 320px;
    }

    .persona select {
      width: 220px;
    }

    pre {
      text-align: left;
      background: #f4f4f4;
      color: black;
      padding: 15px;
      border-radius: 5px;
      white-space: pre-wrap;
      margin-top: 15px;
      overflow-x: auto;
    }

    #lista {
      margin-top: 20px;
      text-align: left;
    }

    .seccion {
      margin-top: 25px;
      border-top: 1px solid #ddd;
      padding-top: 20px;
    }
  </style>
</head>
<body>

  <h1>📍 Control de Partes</h1>

  <div class="card">

    <!-- =========================
         1. VALIDAR RESPONSABLE
    ========================= -->
    <div class="seccion">
      <h2>1. Validar responsable</h2>
      <input id="cedula_responsable" placeholder="Cédula de quien saca el parte" />
      <br>
      <button onclick="validarResponsable()">Validar responsable</button>
      <div id="datos_responsable" style="margin-top:10px; font-weight:bold;"></div>

      <div style="display:none;">
        <input id="grado" />
        <input id="nombre_elabora" />
        <input id="cedula_elabora" />
        <input id="telefono_elabora" />
        <input id="latitud" />
        <input id="longitud" />
      </div>
    </div>

    <!-- =========================
         2. SUBIR EXCEL
    ========================= -->
    <div class="seccion" id="bloqueExcel" style="display:none;">
      <h2>2. Subir Excel</h2>
      <input type="file" id="fileExcel" accept=".xlsx" />
      <button onclick="subirExcel()">Subir Excel</button>
    </div>

    <!-- =========================
         3. SELECCIONAR UBICACIÓN
    ========================= -->
    <div class="seccion">
      <h2>3. Seleccionar ubicación</h2>

      <select id="unidad_select" onchange="cargarSubunidades()">
        <option value="">Seleccionar UNIDAD</option>
      </select>
      <br>

      <select id="subunidad_select" onchange="cargarEstaciones(); cargarOrganicos()">
        <option value="">Seleccionar SUBUNIDAD</option>
      </select>
      <br>

      <select id="estacion_select" onchange="cargarOrganicos()">
        <option value="">Seleccionar ESTACIÓN</option>
      </select>
      <br>

      <div id="bloqueOrganico" style="display:none;">
        <select id="organico_select">
          <option value="">Seleccionar ORGÁNICO</option>
        </select>
        <br>
      </div>

      <button onclick="cargarPersonal()">Cargar Personal</button>
    </div>

    <!-- =========================
         4. NOVEDADES
    ========================= -->
    <div class="seccion">
      <h2>4. Novedades por persona</h2>
      <div id="lista"></div>
      <button onclick="guardarNovedades()">Guardar Novedades</button>
    </div>

    <!-- =========================
         5. GENERAR PARTE
    ========================= -->
    <div class="seccion">
      <h2>5. Generar parte</h2>
      <button onclick="generarParte()">Generar Parte</button>
      <button onclick="descargarPDF()">Descargar PDF</button>
      <br>
      <input type="file" id="foto_parte" accept="image/*" capture="environment">
      <pre id="resultado"></pre>
    </div>

    <!-- =========================
         6. CONSULTA GENERAL DE NOVEDADES
    ========================= -->
    <div class="seccion" id="bloqueConsultaGeneral" style="display:none;">
      <h2>6. Consulta general de novedades</h2>

      <select id="consulta_unidad">
        <option value="">Seleccionar UNIDAD</option>
      </select>
      <br>

      <select id="consulta_subunidad">
        <option value="">Seleccionar SUBUNIDAD</option>
      </select>
      <br>

      <select id="consulta_estacion">
        <option value="">Todas las ESTACIONES</option>
      </select>
      <br>

      <select id="consulta_organico">
        <option value="">Todos los ORGÁNICOS</option>
      </select>
      <br>

      <button onclick="consultarNovedades()">Consultar novedades</button>

      <pre id="resultado_general"></pre>
      <pre id="resultado_detalle"></pre>
    </div>

  </div>

  <script>
    /* =========================
       VARIABLES GLOBALES
    ========================= */
    let estructuraGlobal = [];

    /* =========================
       SUBIR EXCEL
    ========================= */
    async function subirExcel() {
      const input = document.getElementById("fileExcel");

      if (!input.files.length) {
        alert("Selecciona un archivo Excel");
        return;
      }

      const formData = new FormData();
      formData.append("archivo", input.files[0]);

      try {
        const res = await fetch("/subir-excel", {
          method: "POST",
          body: formData
        });

        const data = await res.text();
        alert(data);
        await cargarEstructura();
      } catch (error) {
        console.error(error);
        alert("Error subiendo Excel: " + error.message);
      }
    }

    /* =========================
       VALIDAR RESPONSABLE
    ========================= */
    async function validarResponsable() {
      const cedula = document.getElementById("cedula_responsable").value.trim();

      document.getElementById("lista").innerHTML = "";
      document.getElementById("resultado").innerText = "";
      document.getElementById("resultado_general").innerText = "";
      document.getElementById("resultado_detalle").innerText = "";

      if (!cedula) {
        alert("Ingresa la cédula");
        return;
      }

      try {
        const res = await fetch("/validar-responsable", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ cedula })
        });

        const data = await res.json();

        if (!data.ok) {
          document.getElementById("datos_responsable").innerText = "No autorizado";
          document.getElementById("bloqueExcel").style.display = "none";
          document.getElementById("bloqueOrganico").style.display = "none";
          document.getElementById("bloqueConsultaGeneral").style.display = "none";

          document.getElementById("unidad_select").value = "";
          document.getElementById("subunidad_select").innerHTML = '<option value="">Seleccionar SUBUNIDAD</option>';
          document.getElementById("estacion_select").innerHTML = '<option value="">Seleccionar ESTACIÓN</option>';
          document.getElementById("organico_select").innerHTML = '<option value="">Seleccionar ORGÁNICO</option>';

          document.getElementById("unidad_select").disabled = true;
          document.getElementById("subunidad_select").disabled = true;
          document.getElementById("estacion_select").disabled = true;

          document.getElementById("grado").value = "";
          document.getElementById("nombre_elabora").value = "";
          document.getElementById("cedula_elabora").value = "";
          document.getElementById("telefono_elabora").value = "";
          return;
        }

        document.getElementById("datos_responsable").innerText = `${data.grado} - ${data.nombre}`;
        document.getElementById("grado").value = data.grado || "";
        document.getElementById("nombre_elabora").value = data.nombre || "";
        document.getElementById("cedula_elabora").value = data.cedula || "";
        document.getElementById("telefono_elabora").value = data.telefono || "";

        if (!data.esOficial) {
          document.getElementById("unidad_select").value = data.unidad || "";
          cargarSubunidades();

          document.getElementById("subunidad_select").value = data.subunidad || "";
          cargarEstaciones();

          document.getElementById("estacion_select").value = data.estacion || "";

          if (data.esOficial || data.rol === "ADMIN_EXCEL") {
            cargarOrganicos();
            document.getElementById("organico_select").value = data.organico || "";
          }

          document.getElementById("unidad_select").disabled = true;
          document.getElementById("subunidad_select").disabled = true;
          document.getElementById("estacion_select").disabled = true;
        } else {
          document.getElementById("unidad_select").disabled = false;
          document.getElementById("subunidad_select").disabled = false;
          document.getElementById("estacion_select").disabled = false;
        }

        if (data.esOficial || data.rol === "ADMIN_EXCEL") {
          document.getElementById("bloqueOrganico").style.display = "block";
          document.getElementById("bloqueConsultaGeneral").style.display = "block";
        } else {
          document.getElementById("bloqueOrganico").style.display = "none";
          document.getElementById("bloqueConsultaGeneral").style.display = "none";
        }

        document.getElementById("bloqueExcel").style.display = data.puedeSubirExcel ? "block" : "none";

        cargarFiltrosConsulta();

        if (data.esOficial || data.rol === "ADMIN_EXCEL") {
          document.getElementById("consulta_unidad").value = data.unidad || "";
          cargarConsultaSubunidades();
          document.getElementById("consulta_subunidad").value = data.subunidad || "";
          cargarConsultaEstacionesYOrganicos();

          if (data.estacion) {
            document.getElementById("consulta_estacion").value = data.estacion;
          }

          if (data.organico) {
            document.getElementById("consulta_organico").value = data.organico;
          }
        }

      } catch (error) {
        console.error(error);
        alert("Error validando responsable");
      }
    }

    /* =========================
       CARGAR ESTRUCTURA
    ========================= */
    async function cargarEstructura() {
      try {
        const res = await fetch("/estructura");
        const data = await res.json();

        estructuraGlobal = data;

        const unidadSelect = document.getElementById("unidad_select");
        unidadSelect.innerHTML = '<option value="">Seleccionar UNIDAD</option>';

        const unidades = [...new Set(data.map(x => x.unidad).filter(Boolean))];

        unidades.forEach(unidad => {
          const option = document.createElement("option");
          option.value = unidad;
          option.textContent = unidad;
          unidadSelect.appendChild(option);
        });

        document.getElementById("subunidad_select").innerHTML = '<option value="">Seleccionar SUBUNIDAD</option>';
        document.getElementById("estacion_select").innerHTML = '<option value="">Seleccionar ESTACIÓN</option>';
        document.getElementById("organico_select").innerHTML = '<option value="">Seleccionar ORGÁNICO</option>';

        cargarFiltrosConsulta();
      } catch (error) {
        console.error(error);
      }
    }

    /* =========================
       CARGAR SUBUNIDADES
    ========================= */
    function cargarSubunidades() {
      const unidad = document.getElementById("unidad_select").value;
      const subunidadSelect = document.getElementById("subunidad_select");

      const filtrados = estructuraGlobal.filter(x => x.unidad === unidad);
      const subunidades = [...new Set(filtrados.map(x => x.subunidad).filter(Boolean))];

      subunidadSelect.innerHTML = '<option value="">Seleccionar SUBUNIDAD</option>';

      subunidades.forEach(sub => {
        const option = document.createElement("option");
        option.value = sub;
        option.textContent = sub;
        subunidadSelect.appendChild(option);
      });

      document.getElementById("estacion_select").innerHTML = '<option value="">Seleccionar ESTACIÓN</option>';
      document.getElementById("organico_select").innerHTML = '<option value="">Seleccionar ORGÁNICO</option>';
    }

    /* =========================
       CARGAR ESTACIONES
    ========================= */
    function cargarEstaciones() {
      const unidad = document.getElementById("unidad_select").value;
      const subunidad = document.getElementById("subunidad_select").value;
      const estacionSelect = document.getElementById("estacion_select");

      estacionSelect.innerHTML = '<option value="">Seleccionar ESTACIÓN</option>';

      const estaciones = [
        ...new Set(
          estructuraGlobal
            .filter(x => x.unidad === unidad && x.subunidad === subunidad)
            .map(x => x.estacion)
            .filter(Boolean)
        )
      ];

      estaciones.forEach(estacion => {
        const option = document.createElement("option");
        option.value = estacion;
        option.textContent = estacion;
        estacionSelect.appendChild(option);
      });
    }

    /* =========================
       CARGAR ORGÁNICOS
    ========================= */
    function cargarOrganicos() {
      const unidad = document.getElementById("unidad_select").value;
      const subunidad = document.getElementById("subunidad_select").value;
      const estacion = document.getElementById("estacion_select").value;
      const organicoSelect = document.getElementById("organico_select");

      organicoSelect.innerHTML = '<option value="">Seleccionar ORGÁNICO</option>';

      let filtrados = estructuraGlobal.filter(x =>
        x.unidad === unidad &&
        x.subunidad === subunidad
      );

      if (estacion && estacion.trim() !== "") {
        filtrados = filtrados.filter(x => x.estacion === estacion);
      }

      const organicos = [...new Set(filtrados.map(x => x.organico).filter(Boolean))];

      organicos.forEach(o => {
        const option = document.createElement("option");
        option.value = o;
        option.textContent = o;
        organicoSelect.appendChild(option);
      });
    }

    /* =========================
       CARGAR PERSONAL
    ========================= */
    async function cargarPersonal() {
      const cedulaValidada = document.getElementById("cedula_elabora").value.trim();

      if (!cedulaValidada) {
        alert("Primero debes validar al responsable");
        return;
      }

      const unidad = document.getElementById("unidad_select").value;
      const subunidad = document.getElementById("subunidad_select").value;
      const estacion = document.getElementById("estacion_select").value;
      const organico = document.getElementById("organico_select")?.value || "";

      if (!unidad || !subunidad) {
        alert("Unidad y subunidad son obligatorias");
        return;
      }

      try {
        const res = await fetch("/personal-filtrado", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ unidad, subunidad, estacion, organico })
        });

        const data = await res.json();
        const contenedor = document.getElementById("lista");
        contenedor.innerHTML = "";

        if (!data.ok || !data.data || data.data.length === 0) {
          contenedor.innerHTML = "<p>No hay personal para ese filtro.</p>";
          return;
        }

        const ordenGrados = ["CR","TC","MY","CT","TE","ST","CM","SC","IJ","IT","SI","PT","PP","AUX"];

        data.data.sort((a, b) => {
          const ga = (a.grado || "").toUpperCase();
          const gb = (b.grado || "").toUpperCase();
          const ia = ordenGrados.indexOf(ga);
          const ib = ordenGrados.indexOf(gb);
          return (ia === -1 ? 999 : ia) - (ib === -1 ? 999 : ib);
        });

        data.data.forEach(p => {
          const div = document.createElement("div");
          div.className = "persona";

          div.innerHTML = `
            <b>${p.grado || ""} ${p.apellidos || ""} ${p.nombres || ""} - CC ${p.cedula || ""}</b>
            <select id="novedad-${p.cedula}">
              <option value="">DISPONIBLE</option>
              <option value="SERVICIO">SERVICIO</option>
              <option value="PERMISO">PERMISO</option>
              <option value="VACACIONES">VACACIONES</option>
              <option value="CURSO ASCENSO">CURSO ASCENSO</option>
              <option value="COMISION EXTERIOR">COMISION EXTERIOR</option>
              <option value="COMISION DE SERVICIO">COMISION DE SERVICIO</option>
              <option value="HOSPITALIZADO">HOSPITALIZADO</option>
              <option value="FRANQUICIA">FRANQUICIA</option>
              <option value="RETARDADOS DE LA FORMACION">RETARDADOS DE LA FORMACION</option>
              <option value="PLAN ELECTORAL">PLAN ELECTORAL</option>
              <option value="PERMISO NAVIDEÑO">PERMISO NAVIDEÑO</option>
              <option value="PERMISO SEMANA SANTA">PERMISO SEMANA SANTA</option>
              <option value="PERMISO EXTRAORDINARIOS">PERMISO EXTRAORDINARIOS</option>
              <option value="LICENCIA LUTO">LICENCIA LUTO</option>
              <option value="LICENCIA MATERNIDAD">LICENCIA MATERNIDAD</option>
              <option value="HORARIO FLEXIBLE">HORARIO FLEXIBLE</option>
              <option value="FUERA DE LA FORMACION">FUERA DE LA FORMACION</option>
              <option value="CITA MEDICA">CITA MEDICA</option>
              <option value="CUMPLE FUNCIONES DIFERENTES DE POLCO">CUMPLE FUNCIONES DIFERENTES DE POLCO</option>
              <option value="NO ES DE POLCO PERO CUMPLE FUNCIONES DE POLCO">NO ES DE POLCO PERO CUMPLE FUNCIONES DE POLCO</option>
            </select>
          `;

          contenedor.appendChild(div);
        });

        if (navigator.geolocation) {
          navigator.geolocation.getCurrentPosition((pos) => {
            document.getElementById("latitud").value = pos.coords.latitude;
            document.getElementById("longitud").value = pos.coords.longitude;
          });
        }
      } catch (error) {
        console.error(error);
        alert("Error cargando personal");
      }
    }

    /* =========================
       GUARDAR NOVEDADES
    ========================= */
    async function guardarNovedades() {
      const personas = document.querySelectorAll(".persona");
      const estacion = document.getElementById("estacion_select").value;
      const novedades = [];

      const gradoUsuario = document.getElementById("grado").value.trim().toUpperCase();
      const rolUsuario = (document.getElementById("bloqueExcel").style.display === "block") ? "ADMIN_EXCEL" : "OPERADOR_PARTE";

      const validar = await fetch(`/validar-parte?grado=${encodeURIComponent(gradoUsuario)}&rol=${encodeURIComponent(rolUsuario)}`);
      const dataVal = await validar.json();

      if (!dataVal.guardarOficial) {
        alert("⚠️ Fuera de horario. Solo puedes generar parte en modo consulta.");
        return;
      }

      personas.forEach(p => {
        const select = p.querySelector("select");
        const cedula = select.id.replace("novedad-", "");
        const tipo = select.value;
        novedades.push({ cedula, tipo });
      });

      try {
        const grado = document.getElementById("grado").value.trim();
        const rol = (document.getElementById("bloqueExcel").style.display === "block")
          ? "ADMIN_EXCEL"
          : "OPERADOR_PARTE";

        const res = await fetch("/guardar-novedades", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({ novedades, estacion, grado, rol })
        });

        const data = await res.json();

        if (data.ok) {
          alert(data.mensaje || "Novedades guardadas correctamente ✅");
        } else {
          alert(data.mensaje || data.error || "Error al guardar ❌");
        }
      } catch (error) {
        alert("Error de conexión ❌");
      }
    }

    /* =========================
       GENERAR PARTE
    ========================= */
    async function generarParte() {
      const estacion = document.getElementById("estacion_select").value.trim().toUpperCase();
      const unidad = document.getElementById("unidad_select").value;
      const grado = document.getElementById("grado").value.trim();
      const nombre = document.getElementById("nombre_elabora").value.trim();
      const cedula = document.getElementById("cedula_elabora").value.trim();
      const telefono = document.getElementById("telefono_elabora").value.trim();
      const organico = document.getElementById("organico_select").value;
      const resultado = document.getElementById("resultado");

      if (!estacion && !organico) {
        resultado.innerText = "Debes seleccionar estación u orgánico.";
        return;
      }

      const gradoUsuario = document.getElementById("grado").value.trim().toUpperCase();
      const rolUsuario = (document.getElementById("bloqueExcel").style.display === "block") ? "ADMIN_EXCEL" : "OPERADOR_PARTE";

      const validar = await fetch(`/validar-parte?grado=${encodeURIComponent(gradoUsuario)}&rol=${encodeURIComponent(rolUsuario)}`);
      const dataVal = await validar.json();

      if (!dataVal.ok) {
        alert(dataVal.mensaje);
        return;
      }

      const personas = document.querySelectorAll(".persona");
      const novedadesSeleccionadas = [];

      personas.forEach(p => {
        const select = p.querySelector("select");
        const cedulaPersona = select.id.replace("novedad-", "");
        const tipo = select.value || "";
        novedadesSeleccionadas.push({ cedula: cedulaPersona, tipo });
      });

      try {
        const url = `/parte-texto?estacion=${encodeURIComponent(estacion)}&organico=${encodeURIComponent(organico)}&unidad=${encodeURIComponent(unidad)}&grado=${encodeURIComponent(grado)}&nombre=${encodeURIComponent(nombre)}&cedula=${encodeURIComponent(cedula)}&telefono=${encodeURIComponent(telefono)}`;

        const res = await fetch(url, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            novedades: novedadesSeleccionadas
          })
        });

        const data = await res.json();

        if (!data.ok) {
          resultado.innerText = "Error: " + (data.error || "No se pudo generar el parte");
          return;
        }

        resultado.style.color = dataVal.extemporaneo ? "red" : "black";
        resultado.innerText = dataVal.extemporaneo
          ? "⚠️ REPORTE EXTEMPORÁNEO\n\n" + data.texto
          : data.texto;

      } catch (error) {
        console.error(error);
        resultado.innerText = "Error conectando con el servidor";
      }
    }

    /* =========================
       CONSTRUIR TEXTO QR
    ========================= */
    function construirTextoQRUbicacion() {
      let lat = document.getElementById("latitud").value || "";
      let lng = document.getElementById("longitud").value || "";
      const estacion = document.getElementById("estacion_select").value.trim().toUpperCase();

      const fecha = new Date().toLocaleString("es-CO", {
        timeZone: "America/Bogota",
        hour12: false
      });

      const mapaEstaciones = {
        "CIUDAD BOLIVAR": { lat: "4.532", lng: "-74.155" },
        "CANDELARIA": { lat: "4.597", lng: "-74.073" },
        "SANTA FE": { lat: "4.609", lng: "-74.083" },
        "BOSA": { lat: "4.613", lng: "-74.185" },
        "KENNEDY": { lat: "4.627", lng: "-74.153" }
      };

      if (!lat || !lng) {
        if (mapaEstaciones[estacion]) {
          lat = mapaEstaciones[estacion].lat;
          lng = mapaEstaciones[estacion].lng;
        } else {
          return "";
        }
      }

      return `UBICACION PARTE
ESTACION: ${estacion}
LAT: ${lat}
LNG: ${lng}
FECHA: ${fecha}`;
    }

    /* =========================
       PROCESAR FOTO CON SELLO
    ========================= */
    async function procesarFotoConSello() {
      const input = document.getElementById("foto_parte");

      if (!input.files.length) return "";

      const file = input.files[0];
      const img = new Image();
      const reader = new FileReader();

      return new Promise((resolve) => {
        reader.onload = function (e) {
          img.src = e.target.result;
        };

        img.onload = function () {
          const canvas = document.createElement("canvas");
          const ctx = canvas.getContext("2d");

          canvas.width = img.width;
          canvas.height = img.height;

          ctx.drawImage(img, 0, 0);

          const estacion = document.getElementById("estacion_select").value;
          const lat = document.getElementById("latitud").value || "N/A";
          const lng = document.getElementById("longitud").value || "N/A";

          const fecha = new Date().toLocaleString("es-CO", {
            timeZone: "America/Bogota",
            hour12: false
          });

          ctx.fillStyle = "rgba(0,0,0,0.6)";
          ctx.fillRect(0, canvas.height - 120, canvas.width, 120);

          ctx.fillStyle = "#00FF00";
          ctx.font = "20px Arial";
          ctx.fillText(`ESTACION: ${estacion}`, 20, canvas.height - 80);
          ctx.fillText(`FECHA: ${fecha}`, 20, canvas.height - 50);
          ctx.fillText(`LAT: ${lat}  LNG: ${lng}`, 20, canvas.height - 20);

          resolve(canvas.toDataURL("image/jpeg", 0.9));
        };

        reader.readAsDataURL(file);
      });
    }

    /* =========================
       DESCARGAR PDF
    ========================= */
    async function descargarPDF() {
      let contenido = document.getElementById("resultado").innerText.trim();
      contenido = contenido.replace(/^⚠️ REPORTE EXTEMPORÁNEO\s*\n\s*/i, "");
      contenido = contenido.replace(/^PARTE DE PERSONAL\s*\n/i, "");

      if (!contenido) {
        alert("Primero genera el parte");
        return;
      }

      const ventana = window.open("", "_blank");

      if (!ventana) {
        alert("El navegador bloqueó la ventana del PDF. Permite ventanas emergentes.");
        return;
      }

      ventana.document.write(`
        <html>
          <head>
            <title>Generando PDF...</title>
          </head>
          <body style="font-family: Arial, sans-serif; padding: 20px;">
            Generando PDF, por favor espera...
          </body>
        </html>
      `);
      ventana.document.close();

      const estacion = document.getElementById("estacion_select").value.trim().toUpperCase();
      const unidad = document.getElementById("unidad_select").value;
      const subunidad = document.getElementById("subunidad_select").value;
      const grado = document.getElementById("grado").value.trim();
      const nombre = document.getElementById("nombre_elabora").value.trim();
      const cedula = document.getElementById("cedula_elabora").value.trim();
      const telefono = document.getElementById("telefono_elabora").value.trim();

      const gradoUsuario = document.getElementById("grado").value.trim().toUpperCase();
      const rolUsuario = (document.getElementById("bloqueExcel").style.display === "block") ? "ADMIN_EXCEL" : "OPERADOR_PARTE";

      try {
        const validar = await fetch(`/validar-parte?grado=${encodeURIComponent(gradoUsuario)}&rol=${encodeURIComponent(rolUsuario)}`);
        const dataVal = await validar.json();

        if (dataVal.guardarOficial) {
          const resGuardar = await fetch("/guardar-parte-pdf", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              tipo: dataVal.tipo || null,
              unidad,
              subunidad,
              estacion,
              grado_responsable: grado,
              nombre_responsable: nombre,
              cedula_responsable: cedula,
              telefono_responsable: telefono,
              texto_parte: contenido
            })
          });

          let dataGuardar = {};
          try {
            dataGuardar = await resGuardar.json();
          } catch (e) {
            console.warn("Respuesta no es JSON, se ignora");
          }

          if (dataGuardar && dataGuardar.ok === false) {
            const mensajeGuardar = dataGuardar.mensaje || dataGuardar.error || "";

            if (mensajeGuardar.includes("Ya se registró")) {
              console.warn("Parte ya registrado, se genera PDF sin guardar.");
            } else if (mensajeGuardar.includes("Fuera de horario")) {
              console.warn("Fuera de horario, se genera PDF en modo consulta.");
            } else {
              alert(mensajeGuardar || "No se pudo guardar el parte");
              return;
            }
          }
        }

        const fotoBase64 = await procesarFotoConSello();
        const qrTexto = construirTextoQRUbicacion();
        const qrUrl = qrTexto
          ? `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${encodeURIComponent(qrTexto)}`
          : "";

        ventana.document.open();
        ventana.document.write(`
          <html>
            <head>
              <title>Parte PDF</title>
              <style>
                body {
                  font-family: Arial, sans-serif;
                  padding: 20px;
                }

                .marca-agua {
                  position: fixed;
                  top: 50%;
                  left: 50%;
                  transform: translate(-50%, -50%) rotate(-30deg);
                  font-size: 60px;
                  color: rgba(0, 0, 0, 0.08);
                  font-weight: bold;
                  white-space: nowrap;
                  z-index: 0;
                  pointer-events: none;
                }

                .encabezado {
                  display: flex;
                  justify-content: space-between;
                  align-items: flex-start;
                  gap: 20px;
                  margin-bottom: 20px;
                  width: 100%;
                  position: relative;
                  z-index: 1;
                }

                .titulo {
                  font-size: 20px;
                  font-weight: bold;
                  margin-top: 10px;
                  flex: 1;
                }

                .lado-derecho {
                  display: flex;
                  flex-direction: row;
                  flex-wrap: nowrap;
                  align-items: flex-start;
                  justify-content: flex-end;
                  gap: 14px;
                  min-width: 230px;
                }

                .qr-box,
                .foto-box {
                  text-align: center;
                }

                .qr-box img {
                  width: 95px;
                  height: 95px;
                }

                .foto-box img {
                  width: 120px;
                  height: 120px;
                  object-fit: cover;
                  border-radius: 6px;
                  border: 1px solid #bbb;
                }

                .label {
                  font-size: 10px;
                  text-align: center;
                  margin-top: 4px;
                }

                pre {
                  white-space: pre-wrap;
                  font-family: "Courier New", monospace;
                  font-size: 14px;
                  position: relative;
                  z-index: 1;
                }
              </style>
            </head>
            <body>
              <div class="marca-agua">DOCUMENTO NO CONTROLADO</div>

              <div class="encabezado">
                <div class="titulo">REGISTRO DEL PARTE</div>

                <div class="lado-derecho">
                  ${qrUrl ? `
                    <div class="qr-box">
                      <img src="${qrUrl}" />
                      <div class="label">Ubicación</div>
                    </div>
                  ` : ""}

                  ${fotoBase64 ? `
                    <div class="foto-box">
                      <img src="${fotoBase64}" />
                      <div class="label">Evidencia</div>
                    </div>
                  ` : ""}
                </div>
              </div>

              <pre>${contenido.replace(/</g, "&lt;").replace(/>/g, "&gt;")}</pre>

              <script>
                window.print();
              <\/script>
            </body>
          </html>
        `);
        ventana.document.close();

      } catch (error) {
        console.error("ERROR PDF:", error);

        try {
          if (ventana && !ventana.closed) {
            ventana.close();
          }
        } catch (_) {}

        alert("Error PDF: " + (error.message || error));
      }
    }

    /* =========================
       CARGAR FILTROS CONSULTA GENERAL
    ========================= */
    function cargarFiltrosConsulta() {
      const unidadSelect = document.getElementById("consulta_unidad");
      const subunidadSelect = document.getElementById("consulta_subunidad");
      const estacionSelect = document.getElementById("consulta_estacion");
      const organicoSelect = document.getElementById("consulta_organico");

      if (!unidadSelect || !subunidadSelect || !estacionSelect || !organicoSelect) return;

      unidadSelect.innerHTML = '<option value="">Seleccionar UNIDAD</option>';
      subunidadSelect.innerHTML = '<option value="">Seleccionar SUBUNIDAD</option>';
      estacionSelect.innerHTML = '<option value="">Todas las ESTACIONES</option>';
      organicoSelect.innerHTML = '<option value="">Todos los ORGÁNICOS</option>';

      const unidades = [...new Set(estructuraGlobal.map(x => x.unidad).filter(Boolean))];

      unidades.forEach(unidad => {
        const option = document.createElement("option");
        option.value = unidad;
        option.textContent = unidad;
        unidadSelect.appendChild(option);
      });
    }

    /* =========================
       CONSULTA: SUBUNIDADES
    ========================= */
    function cargarConsultaSubunidades() {
      const unidad = document.getElementById("consulta_unidad").value;
      const subunidadSelect = document.getElementById("consulta_subunidad");
      const estacionSelect = document.getElementById("consulta_estacion");
      const organicoSelect = document.getElementById("consulta_organico");

      subunidadSelect.innerHTML = '<option value="">Seleccionar SUBUNIDAD</option>';
      estacionSelect.innerHTML = '<option value="">Todas las ESTACIONES</option>';
      organicoSelect.innerHTML = '<option value="">Todos los ORGÁNICOS</option>';

      const filtrados = estructuraGlobal.filter(x => x.unidad === unidad);
      const subunidades = [...new Set(filtrados.map(x => x.subunidad).filter(Boolean))];

      subunidades.forEach(sub => {
        const option = document.createElement("option");
        option.value = sub;
        option.textContent = sub;
        subunidadSelect.appendChild(option);
      });
    }

    /* =========================
       CONSULTA: ESTACIONES Y ORGÁNICOS
    ========================= */
    function cargarConsultaEstacionesYOrganicos() {
      const unidad = document.getElementById("consulta_unidad").value;
      const subunidad = document.getElementById("consulta_subunidad").value;
      const estacionSelect = document.getElementById("consulta_estacion");
      const organicoSelect = document.getElementById("consulta_organico");

      estacionSelect.innerHTML = '<option value="">Todas las ESTACIONES</option>';
      organicoSelect.innerHTML = '<option value="">Todos los ORGÁNICOS</option>';

      const filtrados = estructuraGlobal.filter(x =>
        x.unidad === unidad &&
        x.subunidad === subunidad
      );

      const estaciones = [...new Set(filtrados.map(x => x.estacion).filter(Boolean))];
      const organicos = [...new Set(filtrados.map(x => x.organico).filter(Boolean))];

      estaciones.forEach(est => {
        const option = document.createElement("option");
        option.value = est;
        option.textContent = est;
        estacionSelect.appendChild(option);
      });

      organicos.forEach(org => {
        const option = document.createElement("option");
        option.value = org;
        option.textContent = org;
        organicoSelect.appendChild(option);
      });
    }

    /* =========================
       CONSULTAR NOVEDADES
    ========================= */
    async function consultarNovedades() {
      const unidad = document.getElementById("consulta_unidad").value;
      const subunidad = document.getElementById("consulta_subunidad").value;
      const estacion = document.getElementById("consulta_estacion").value;
      const organico = document.getElementById("consulta_organico").value;
      const grado = document.getElementById("grado").value.trim();
      const rol = (document.getElementById("bloqueExcel").style.display === "block")
        ? "ADMIN_EXCEL"
        : "OPERADOR_PARTE";

      const generalBox = document.getElementById("resultado_general");
      const detalleBox = document.getElementById("resultado_detalle");

      generalBox.innerText = "";
      detalleBox.innerText = "";

      if (!unidad || !subunidad) {
        alert("Unidad y subunidad son obligatorias");
        return;
      }

      try {
        const res = await fetch("/consulta-novedades", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            unidad,
            subunidad,
            estacion,
            organico,
            grado,
            rol
          })
        });

        const data = await res.json();

        if (!data.ok) {
          alert(data.error || "No se pudo consultar novedades");
          return;
        }

        let textoGeneral = "GENERAL\n\n";
        data.general.forEach(item => {
          textoGeneral += `${item.tipo.padEnd(35, " ")} ${item.conteo.padEnd(12, " ")} ${item.total}\n`;
        });

        let textoDetalle = "DETALLE INDIVIDUAL\n\n";
        data.detalleAgrupado.forEach(grupo => {
          textoDetalle += `${grupo.tipo} ${grupo.conteo}   ${grupo.total}\n`;

          grupo.personas.forEach((p, i) => {
            textoDetalle += `${i + 1}. ${p.grado} | ${p.apellidos} | ${p.nombres} | ${p.cedula} | ${p.telefono} | ${p.estacion}\n`;
          });

          textoDetalle += `\n`;
        });

        generalBox.innerText = textoGeneral;
        detalleBox.innerText = textoDetalle;

      } catch (error) {
        console.error(error);
        alert("Error consultando novedades");
      }
    }

    /* =========================
       EVENTOS FILTROS CONSULTA
    ========================= */
    document.addEventListener("DOMContentLoaded", () => {
      const consultaUnidad = document.getElementById("consulta_unidad");
      const consultaSubunidad = document.getElementById("consulta_subunidad");

      if (consultaUnidad) {
        consultaUnidad.addEventListener("change", cargarConsultaSubunidades);
      }

      if (consultaSubunidad) {
        consultaSubunidad.addEventListener("change", cargarConsultaEstacionesYOrganicos);
      }
    });

    /* =========================
       INICIO
    ========================= */
    cargarEstructura();
  </script>
